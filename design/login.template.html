<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;700&amp;family=JetBrains+Mono&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary": "#0F172A",
                    "secondary-container": "#d5e3fc",
                    "outline-variant": "#a9b4b9",
                    "on-background": "#2a3439",
                    "primary-fixed": "#dbe1ff",
                    "on-secondary-fixed": "#324053",
                    "primary-container": "#dbe1ff",
                    "tertiary": "#006592",
                    "surface-dim": "#cfdce3",
                    "inverse-surface": "#0b0f10",
                    "tertiary-dim": "#005980",
                    "surface-container-lowest": "#ffffff",
                    "on-error-container": "#752121",
                    "secondary-dim": "#465468",
                    "background": "#f7f9fb",
                    "surface-container": "#e8eff3",
                    "error-dim": "#4e0309",
                    "secondary-fixed": "#d5e3fc",
                    "inverse-on-surface": "#9a9d9f",
                    "on-surface": "#2a3439",
                    "surface-container-low": "#f0f4f7",
                    "on-primary-fixed": "#003798",
                    "surface-variant": "#d9e4ea",
                    "on-secondary": "#f8f8ff",
                    "surface": "#f7f9fb",
                    "error-container": "#fe8983",
                    "on-tertiary-container": "#003047",
                    "on-surface-variant": "#566166",
                    "on-tertiary-fixed-variant": "#003954",
                    "on-primary-fixed-variant": "#0050d4",
                    "primary-dim": "#0048c1",
                    "surface-tint": "#0F172A",
                    "on-secondary-fixed-variant": "#4e5c71",
                    "on-tertiary": "#f5f9ff",
                    "tertiary-fixed": "#34b5fa",
                    "surface-container-high": "#e1e9ee",
                    "secondary": "#526074",
                    "secondary-fixed-dim": "#c7d5ed",
                    "error": "#9f403d",
                    "on-secondary-container": "#455367",
                    "on-tertiary-fixed": "#00121e",
                    "on-error": "#fff7f6",
                    "tertiary-container": "#34b5fa",
                    "on-primary-container": "#0048bf",
                    "inverse-primary": "#618bff",
                    "tertiary-fixed-dim": "#17a8ec",
                    "surface-container-highest": "#d9e4ea",
                    "outline": "#717c82",
                    "on-primary": "#f8f7ff",
                    "surface-bright": "#f7f9fb",
                    "primary-fixed-dim": "#c7d3ff"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Space Grotesk"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .font-headline { font-family: 'Space Grotesk', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .bg-pattern {
            background-color: #f7f9fb;
            background-image: 
                radial-gradient(circle at 2px 2px, #e2e8f0 1px, transparent 0);
            background-size: 32px 32px;
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<main class="flex-grow flex items-center justify-center p-6 bg-pattern relative">
<!-- Subtle Ambient Accents -->
<div class="absolute inset-0 overflow-hidden pointer-events-none">
<div class="absolute top-0 right-0 w-[500px] h-[500px] bg-slate-200/40 rounded-full blur-[120px] -translate-y-1/2 translate-x-1/2"></div>
<div class="absolute bottom-0 left-0 w-[500px] h-[500px] bg-slate-200/40 rounded-full blur-[120px] translate-y-1/2 -translate-x-1/2"></div>
</div>
<div class="w-full max-w-md relative z-10">
<!-- Brand Anchor -->
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center w-12 h-12 rounded bg-[#0F172A] mb-4 shadow-sm">
<span class="material-symbols-outlined text-white text-2xl" data-icon="hub">hub</span>
</div>
<h1 class="font-headline text-2xl font-bold tracking-tight text-slate-900">Gateway</h1>
<p class="text-slate-500 text-xs mt-1 uppercase tracking-widest font-medium">Management Console</p>
</div>
<!-- Login Card -->
<div class="bg-white/80 backdrop-blur-xl rounded border border-slate-200/60 shadow-[0_8px_30px_rgb(0,0,0,0.04)] p-10">
<form action="#" class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-[0.6875rem] uppercase font-bold tracking-wider text-slate-500" for="email">Email Address</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-slate-400 text-lg" data-icon="alternate_email">alternate_email</span>
<input class="w-full pl-11 pr-4 py-3 bg-slate-50 rounded border border-slate-200 focus:ring-1 focus:ring-slate-900 focus:border-slate-900 text-sm transition-all outline-none placeholder:text-slate-400" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="block text-[0.6875rem] uppercase font-bold tracking-wider text-slate-500" for="password">Password</label>
<a class="text-[0.6875rem] font-bold text-slate-900 hover:underline transition-colors uppercase tracking-tight" href="#">Forgot password?</a>
</div>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-slate-400 text-lg" data-icon="lock">lock</span>
<input class="w-full pl-11 pr-4 py-3 bg-slate-50 rounded border border-slate-200 focus:ring-1 focus:ring-slate-900 focus:border-slate-900 text-sm transition-all outline-none placeholder:text-slate-400" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Options -->
<div class="flex items-center">
<input class="h-4 w-4 rounded border-slate-300 text-slate-900 focus:ring-slate-900 bg-white" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block text-sm text-slate-600 font-medium" for="remember-me">
                            Remember me
                        </label>
</div>
<!-- Action -->
<button class="w-full py-3 px-4 bg-[#0F172A] text-white rounded font-bold text-sm tracking-wide shadow-sm hover:bg-slate-800 transition-all duration-200 active:scale-[0.98] flex items-center justify-center gap-2" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Footer Link -->
<div class="mt-8 pt-8 border-t border-slate-100 text-center">
<p class="text-sm text-slate-500">
                        New to the gateway? 
                        <a class="text-slate-900 font-bold hover:underline" href="#">Request access</a>
</p>
</div>
</div>
<!-- Trust Indicator -->
<div class="mt-10 flex items-center justify-center gap-6 opacity-30 grayscale">
<span class="material-symbols-outlined text-xl" data-icon="verified_user">verified_user</span>
<span class="material-symbols-outlined text-xl" data-icon="shield">shield</span>
<span class="material-symbols-outlined text-xl" data-icon="security">security</span>
</div>
</div>
</main>
<!-- Footer -->
<footer class="flex flex-col md:flex-row justify-between items-center px-8 py-6 w-full mt-auto bg-slate-50/50 border-t border-slate-200/50">
<div class="text-[0.6875rem] uppercase tracking-wider text-slate-500 font-medium">
            © 2024 Logic. All rights reserved.
        </div>
<div class="flex gap-6 mt-4 md:mt-0">
<a class="text-[0.6875rem] uppercase tracking-wider text-slate-400 font-medium hover:text-slate-900 transition-colors" href="#">Privacy Policy</a>
<a class="text-[0.6875rem] uppercase tracking-wider text-slate-400 font-medium hover:text-slate-900 transition-colors" href="#">Terms of Service</a>
<a class="text-[0.6875rem] uppercase tracking-wider text-slate-400 font-medium hover:text-slate-900 transition-colors" href="#">Security Documentation</a>
</div>
</footer>
</body></html>
